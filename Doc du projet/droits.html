<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Droits d'utilisation</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
    }
    h2 { margin-bottom: 20px; font-size: 18px; }
  </style>
</head>
<body>

<h2>Droits d'utilisation :</h2>

<!--
  Acteur : tête à (cx, cy)
    circle  : cy, r=16
    corps   : cy+16 → cy+56
    bras    : cy+30, ±25px
    jambes  : cy+56 → cy+76
    texte   : cy+96  (cy+110 pour 2e ligne)
-->

<svg xmlns="http://www.w3.org/2000/svg" width="800" height="545" viewBox="0 0 800 545">

  <!-- ══════════════════════════════════
       NIVEAU 1 — Utilisateur  cx=400 cy=50
       ══════════════════════════════════ -->
  <circle cx="400" cy="50"  r="16" fill="none" stroke="#444" stroke-width="1.5"/>
  <line x1="400" y1="66"  x2="400" y2="106" stroke="#444" stroke-width="1.5"/>
  <line x1="400" y1="80"  x2="375" y2="95"  stroke="#444" stroke-width="1.5"/>
  <line x1="400" y1="80"  x2="425" y2="95"  stroke="#444" stroke-width="1.5"/>
  <line x1="400" y1="106" x2="380" y2="126" stroke="#444" stroke-width="1.5"/>
  <line x1="400" y1="106" x2="420" y2="126" stroke="#444" stroke-width="1.5"/>
  <text x="400" y="146" text-anchor="middle" font-size="13" fill="#222">Utilisateur</text>

  <!-- Connecteur N1 → barre N2 -->
  <line x1="400" y1="129" x2="400" y2="195" stroke="#444" stroke-width="1.5"/>
  <line x1="160" y1="195" x2="600" y2="195" stroke="#444" stroke-width="1.5"/>

  <!-- Triangle héritage vers Visiteur (apex en haut = vers parent) -->
  <polygon points="160,195 151,212 169,212" fill="white" stroke="#999" stroke-width="1.5"/>
  <line x1="160" y1="212" x2="160" y2="224" stroke="#999" stroke-width="1.5"/>

  <!-- Triangle héritage vers Utilisateur authentifié -->
  <polygon points="600,195 591,212 609,212" fill="white" stroke="#444" stroke-width="1.5"/>
  <line x1="600" y1="212" x2="600" y2="224" stroke="#444" stroke-width="1.5"/>


  <!-- ══════════════════════════════════
       NIVEAU 2 gauche — Visiteur  cx=160 cy=240
       ══════════════════════════════════ -->
  <circle cx="160" cy="240" r="16" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="160" y1="256" x2="160" y2="296" stroke="#999" stroke-width="1.5"/>
  <line x1="160" y1="270" x2="135" y2="285" stroke="#999" stroke-width="1.5"/>
  <line x1="160" y1="270" x2="185" y2="285" stroke="#999" stroke-width="1.5"/>
  <line x1="160" y1="296" x2="140" y2="316" stroke="#999" stroke-width="1.5"/>
  <line x1="160" y1="296" x2="180" y2="316" stroke="#999" stroke-width="1.5"/>
  <text x="160" y="336" text-anchor="middle" font-size="12" fill="#888">Visiteur</text>
  <text x="160" y="352" text-anchor="middle" font-size="11" fill="#bbb">(non connecté)</text>


  <!-- ══════════════════════════════════
       NIVEAU 2 droite — Utilisateur auth  cx=600 cy=240
       ══════════════════════════════════ -->
  <circle cx="600" cy="240" r="16" fill="none" stroke="#444" stroke-width="1.5"/>
  <line x1="600" y1="256" x2="600" y2="296" stroke="#444" stroke-width="1.5"/>
  <line x1="600" y1="270" x2="575" y2="285" stroke="#444" stroke-width="1.5"/>
  <line x1="600" y1="270" x2="625" y2="285" stroke="#444" stroke-width="1.5"/>
  <line x1="600" y1="296" x2="580" y2="316" stroke="#444" stroke-width="1.5"/>
  <line x1="600" y1="296" x2="620" y2="316" stroke="#444" stroke-width="1.5"/>
  <text x="600" y="336" text-anchor="middle" font-size="12" fill="#222">Utilisateur</text>
  <text x="600" y="352" text-anchor="middle" font-size="12" fill="#222">authentifié</text>

  <!-- Connecteur N2 droite → barre N3 -->
  <line x1="600" y1="319" x2="600" y2="390" stroke="#444" stroke-width="1.5"/>
  <line x1="460" y1="390" x2="710" y2="390" stroke="#444" stroke-width="1.5"/>

  <!-- Triangle héritage vers Développeur -->
  <polygon points="460,390 451,407 469,407" fill="white" stroke="#444" stroke-width="1.5"/>
  <line x1="460" y1="407" x2="460" y2="419" stroke="#444" stroke-width="1.5"/>

  <!-- Triangle héritage vers Responsable -->
  <polygon points="710,390 701,407 719,407" fill="white" stroke="#444" stroke-width="1.5"/>
  <line x1="710" y1="407" x2="710" y2="419" stroke="#444" stroke-width="1.5"/>


  <!-- ══════════════════════════════════
       NIVEAU 3 gauche — Développeur  cx=460 cy=435
       ══════════════════════════════════ -->
  <circle cx="460" cy="435" r="16" fill="none" stroke="#444" stroke-width="1.5"/>
  <line x1="460" y1="451" x2="460" y2="491" stroke="#444" stroke-width="1.5"/>
  <line x1="460" y1="465" x2="435" y2="480" stroke="#444" stroke-width="1.5"/>
  <line x1="460" y1="465" x2="485" y2="480" stroke="#444" stroke-width="1.5"/>
  <line x1="460" y1="491" x2="440" y2="511" stroke="#444" stroke-width="1.5"/>
  <line x1="460" y1="491" x2="480" y2="511" stroke="#444" stroke-width="1.5"/>
  <text x="460" y="531" text-anchor="middle" font-size="12" fill="#222">Développeur</text>


  <!-- ══════════════════════════════════
       NIVEAU 3 droite — Responsable  cx=710 cy=435
       ══════════════════════════════════ -->
  <circle cx="710" cy="435" r="16" fill="none" stroke="#444" stroke-width="1.5"/>
  <line x1="710" y1="451" x2="710" y2="491" stroke="#444" stroke-width="1.5"/>
  <line x1="710" y1="465" x2="685" y2="480" stroke="#444" stroke-width="1.5"/>
  <line x1="710" y1="465" x2="735" y2="480" stroke="#444" stroke-width="1.5"/>
  <line x1="710" y1="491" x2="690" y2="511" stroke="#444" stroke-width="1.5"/>
  <line x1="710" y1="491" x2="730" y2="511" stroke="#444" stroke-width="1.5"/>
  <text x="710" y="531" text-anchor="middle" font-size="12" fill="#222">Responsable</text>

</svg>

</body>
</html>
