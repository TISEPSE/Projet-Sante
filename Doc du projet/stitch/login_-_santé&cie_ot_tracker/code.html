<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Santé&amp;Cie OT Tracker</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#197fe6",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111217", /* Custom dark background as per request */
                        "card-dark": "#181b1f", /* Slightly lighter for card */
                        "input-dark": "#0b0c0e", /* Very dark for inputs */
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        /* Custom Grafana-like Grid Background */
        .grafana-grid {
            background-image: linear-gradient(to right, #22252b 1px, transparent 1px),
                              linear-gradient(to bottom, #22252b 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col relative overflow-hidden">
<!-- Background Pattern -->
<div class="absolute inset-0 grafana-grid opacity-20 pointer-events-none z-0"></div>
<!-- Main Content Wrapper -->
<div class="relative z-10 flex flex-1 flex-col items-center justify-center p-4">
<!-- Login Card -->
<div class="w-full max-w-[480px] bg-white dark:bg-card-dark rounded-lg shadow-2xl border border-slate-200 dark:border-[#2c3235] flex flex-col overflow-hidden">
<!-- Card Header / Branding -->
<div class="flex flex-col items-center pt-10 pb-6 px-8 text-center">
<div class="mb-4 flex items-center justify-center size-16 rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined text-4xl">inventory_2</span>
</div>
<h2 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white mb-2">Santé&amp;Cie OT Tracker</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">Please sign in to access SAP Transport Orders</p>
</div>
<!-- Login Form -->
<div class="px-8 pb-10 w-full">
<form action="#" class="flex flex-col gap-5" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="email">Email or username</label>
<div class="relative">
<input class="w-full h-12 rounded bg-slate-50 dark:bg-input-dark border border-slate-300 dark:border-[#3c4753] px-4 text-base text-slate-900 dark:text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary placeholder:text-slate-400 dark:placeholder:text-slate-600 transition-colors" id="email" placeholder="Enter your email or username" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="password">Password</label>
<a class="text-xs font-medium text-primary hover:text-primary/80 transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative flex w-full">
<input class="w-full h-12 rounded rounded-r-none bg-slate-50 dark:bg-input-dark border border-slate-300 dark:border-[#3c4753] border-r-0 px-4 text-base text-slate-900 dark:text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary placeholder:text-slate-400 dark:placeholder:text-slate-600 transition-colors z-10" id="password" placeholder="••••••••••••" type="password"/>
<button class="flex items-center justify-center px-4 h-12 bg-slate-50 dark:bg-input-dark border border-slate-300 dark:border-[#3c4753] border-l-0 rounded-r text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="mt-2 w-full h-12 bg-primary hover:bg-primary/90 text-white font-semibold rounded shadow-md transition-all active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
<span>Log in</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</form>
</div>
<!-- Helper Section -->
<div class="py-4 px-8 bg-slate-50 dark:bg-[#141619] border-t border-slate-200 dark:border-[#2c3235] text-center">
<p class="text-xs text-slate-500 dark:text-slate-400">
                    New to the platform? <a class="text-primary hover:underline font-medium" href="#">Request access</a>
</p>
</div>
</div>
</div>
<!-- Footer -->
<footer class="relative z-10 py-6 text-center text-xs text-slate-500 dark:text-slate-600">
<div class="flex flex-col gap-1 items-center">
<p>Santé&amp;Cie OT Tracker v1.2.0 • Powered by IT Operations</p>
<div class="flex gap-4 mt-2 opacity-60">
<a class="hover:text-slate-400 transition-colors" href="#">Privacy Policy</a>
<span>•</span>
<a class="hover:text-slate-400 transition-colors" href="#">Terms of Service</a>
<span>•</span>
<a class="hover:text-slate-400 transition-colors" href="#">Support</a>
</div>
</div>
</footer>
</body></html>
