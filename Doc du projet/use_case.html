<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Use Case — Projet-Sante</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px;
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    }
    svg { border-radius: 8px; box-shadow: 0 8px 40px rgba(0,0,0,0.6); }
  </style>
</head>
<body>
<svg width="760" height="900" xmlns="http://www.w3.org/2000/svg">

  <rect width="760" height="900" fill="#16213e"/>

  <text x="460" y="25" text-anchor="middle" font-size="13" font-weight="bold"
        fill="#a8b8d8" letter-spacing="1">Système — Projet-Sante</text>

  <line x1="155" y1="33" x2="155" y2="878" stroke="#2d3d5c" stroke-width="1.5"/>

  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#7a9abf"/>
    </marker>
    <!-- Triangle creux : généralisation UML (pointe vers le parent) -->
    <marker id="gen" markerWidth="12" markerHeight="10" refX="12" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="#16213e" stroke="#7a9abf" stroke-width="1.5"/>
    </marker>
  </defs>


  <!-- ══════════════════════════════════
       1. VISITEUR  (cy=60)
  ══════════════════════════════════ -->
  <circle cx="65" cy="60" r="15" fill="none" stroke="#c0d0e8" stroke-width="1.8"/>
  <line x1="65" y1="75"  x2="65" y2="118" stroke="#c0d0e8" stroke-width="1.8"/>
  <line x1="41" y1="96"  x2="89" y2="96"  stroke="#c0d0e8" stroke-width="1.8"/>
  <line x1="65" y1="118" x2="45" y2="148" stroke="#c0d0e8" stroke-width="1.8"/>
  <line x1="65" y1="118" x2="85" y2="148" stroke="#c0d0e8" stroke-width="1.8"/>
  <text x="65" y="166" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0d0e8">Visiteur</text>

  <line x1="89" y1="96" x2="220" y2="72"  stroke="#7a9abf" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="89" y1="96" x2="215" y2="116" stroke="#7a9abf" stroke-width="1.4" marker-end="url(#arr)"/>

  <ellipse cx="295" cy="72"  rx="75" ry="19" fill="#0f1a2e" stroke="#5d7aa8" stroke-width="1.5"/>
  <text x="295" y="76"  text-anchor="middle" font-size="11" fill="#ddeeff">S'inscrire</text>

  <ellipse cx="295" cy="116" rx="80" ry="19" fill="#0f1a2e" stroke="#5d7aa8" stroke-width="1.5"/>
  <text x="295" y="120" text-anchor="middle" font-size="11" fill="#ddeeff">Se connecter</text>


  <!-- ══════════════════════════════════
       2. RESPONSABLE  (cy=230)
       hérite de Utilisateur authentifié
  ══════════════════════════════════ -->
  <circle cx="65" cy="230" r="15" fill="none" stroke="#c0d0e8" stroke-width="1.8"/>
  <line x1="65" y1="245" x2="65" y2="288" stroke="#c0d0e8" stroke-width="1.8"/>
  <line x1="41" y1="266" x2="89" y2="266" stroke="#c0d0e8" stroke-width="1.8"/>
  <line x1="65" y1="288" x2="45" y2="318" stroke="#c0d0e8" stroke-width="1.8"/>
  <line x1="65" y1="288" x2="85" y2="318" stroke="#c0d0e8" stroke-width="1.8"/>
  <text x="65" y="336" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0d0e8">Responsable</text>

  <!-- Généralisation ↓ vers Utilisateur authentifié -->
  <path d="M 38 288 L 38 577 L 62 577"
        stroke="#7a9abf" stroke-width="1.3" fill="none" stroke-dasharray="6,3"
        marker-end="url(#gen)"/>
  <text transform="rotate(-90,20,440)" x="20" y="440"
        text-anchor="middle" font-size="9" fill="#7a9abf">hérite</text>

  <!-- Acteur → Hub -->
  <line x1="89" y1="266" x2="178" y2="266" stroke="#7a9abf" stroke-width="1.4" marker-end="url(#arr)"/>

  <ellipse cx="270" cy="266" rx="90" ry="21" fill="#1a2845" stroke="#8899cc" stroke-width="1.8"/>
  <text x="270" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#ddeeff">Espace Responsable</text>

  <!-- 3 rayons hub(360,266) → UCs -->
  <line x1="360" y1="266" x2="505" y2="226" stroke="#7a9abf" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="360" y1="266" x2="505" y2="266" stroke="#7a9abf" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="360" y1="266" x2="500" y2="306" stroke="#7a9abf" stroke-width="1.2" marker-end="url(#arr)"/>

  <ellipse cx="580" cy="226" rx="75" ry="19" fill="#0f1a2e" stroke="#5d7aa8" stroke-width="1.5"/>
  <text x="580" y="230" text-anchor="middle" font-size="10" fill="#ddeeff">Valider une MEP</text>

  <ellipse cx="580" cy="266" rx="75" ry="19" fill="#0f1a2e" stroke="#5d7aa8" stroke-width="1.5"/>
  <text x="580" y="270" text-anchor="middle" font-size="10" fill="#ddeeff">Annuler une MEP</text>

  <ellipse cx="580" cy="306" rx="80" ry="19" fill="#0f1a2e" stroke="#5d7aa8" stroke-width="1.5"/>
  <text x="580" y="310" text-anchor="middle" font-size="10" fill="#ddeeff">Gérer les équipes</text>


  <!-- ══════════════════════════════════
       3. DÉVELOPPEUR  (cy=424)
       hérite de Utilisateur authentifié
  ══════════════════════════════════ -->
  <circle cx="65" cy="424" r="15" fill="none" stroke="#c0d0e8" stroke-width="1.8"/>
  <line x1="65" y1="439" x2="65" y2="482" stroke="#c0d0e8" stroke-width="1.8"/>
  <line x1="41" y1="460" x2="89" y2="460" stroke="#c0d0e8" stroke-width="1.8"/>
  <line x1="65" y1="482" x2="45" y2="512" stroke="#c0d0e8" stroke-width="1.8"/>
  <line x1="65" y1="482" x2="85" y2="512" stroke="#c0d0e8" stroke-width="1.8"/>
  <text x="65" y="530" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0d0e8">Développeur</text>

  <!-- Généralisation ↓ vers Utilisateur authentifié -->
  <path d="M 27 482 L 27 581 L 62 581"
        stroke="#7a9abf" stroke-width="1.3" fill="none" stroke-dasharray="6,3"
        marker-end="url(#gen)"/>
  <text transform="rotate(-90,11,535)" x="11" y="535"
        text-anchor="middle" font-size="9" fill="#7a9abf">hérite</text>

  <!-- Acteur → Hub -->
  <line x1="89" y1="460" x2="180" y2="460" stroke="#7a9abf" stroke-width="1.4" marker-end="url(#arr)"/>

  <ellipse cx="270" cy="460" rx="88" ry="21" fill="#1a2845" stroke="#8899cc" stroke-width="1.8"/>
  <text x="270" y="464" text-anchor="middle" font-size="11" font-weight="bold" fill="#ddeeff">Espace Développeur</text>

  <!-- 3 rayons hub(358,460) → UCs -->
  <line x1="358" y1="460" x2="518" y2="420" stroke="#7a9abf" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="358" y1="460" x2="513" y2="460" stroke="#7a9abf" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="358" y1="460" x2="508" y2="500" stroke="#7a9abf" stroke-width="1.2" marker-end="url(#arr)"/>

  <ellipse cx="580" cy="420" rx="62" ry="19" fill="#0f1a2e" stroke="#5d7aa8" stroke-width="1.5"/>
  <text x="580" y="424" text-anchor="middle" font-size="10" fill="#ddeeff">Créer un OT</text>

  <ellipse cx="580" cy="460" rx="67" ry="19" fill="#0f1a2e" stroke="#5d7aa8" stroke-width="1.5"/>
  <text x="580" y="464" text-anchor="middle" font-size="10" fill="#ddeeff">Modifier un OT</text>

  <ellipse cx="580" cy="500" rx="72" ry="19" fill="#0f1a2e" stroke="#5d7aa8" stroke-width="1.5"/>
  <text x="580" y="504" text-anchor="middle" font-size="10" fill="#ddeeff">Supprimer un OT</text>


  <!-- ══════════════════════════════════
       4. UTILISATEUR AUTHENTIFIÉ  (cy=594)
       classe de base (parent commun)
  ══════════════════════════════════ -->
  <circle cx="65" cy="594" r="15" fill="none" stroke="#c0d0e8" stroke-width="1.8"/>
  <line x1="65" y1="609" x2="65" y2="652" stroke="#c0d0e8" stroke-width="1.8"/>
  <line x1="41" y1="630" x2="89" y2="630" stroke="#c0d0e8" stroke-width="1.8"/>
  <line x1="65" y1="652" x2="45" y2="682" stroke="#c0d0e8" stroke-width="1.8"/>
  <line x1="65" y1="652" x2="85" y2="682" stroke="#c0d0e8" stroke-width="1.8"/>
  <text x="65" y="700" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0d0e8">Utilisateur</text>
  <text x="65" y="716" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0d0e8">authentifié</text>

  <!-- Acteur → Hub -->
  <line x1="89" y1="630" x2="188" y2="638" stroke="#7a9abf" stroke-width="1.4" marker-end="url(#arr)"/>

  <ellipse cx="270" cy="640" rx="80" ry="21" fill="#1a2845" stroke="#8899cc" stroke-width="1.8"/>
  <text x="270" y="644" text-anchor="middle" font-size="11" font-weight="bold" fill="#ddeeff">Espace Utilisateur</text>

  <!-- 5 rayons hub(350,640) → UCs -->
  <line x1="350" y1="640" x2="475" y2="558" stroke="#7a9abf" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="350" y1="640" x2="472" y2="600" stroke="#7a9abf" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="350" y1="640" x2="475" y2="640" stroke="#7a9abf" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="350" y1="640" x2="495" y2="680" stroke="#7a9abf" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="350" y1="640" x2="505" y2="722" stroke="#7a9abf" stroke-width="1.2" marker-end="url(#arr)"/>

  <ellipse cx="580" cy="558" rx="105" ry="19" fill="#0f1a2e" stroke="#5d7aa8" stroke-width="1.5"/>
  <text x="580" y="562" text-anchor="middle" font-size="10" fill="#ddeeff">Consulter la liste des OT</text>

  <ellipse cx="580" cy="600" rx="108" ry="19" fill="#0f1a2e" stroke="#5d7aa8" stroke-width="1.5"/>
  <text x="580" y="604" text-anchor="middle" font-size="10" fill="#ddeeff">Consulter le détail d'un OT</text>

  <ellipse cx="580" cy="640" rx="105" ry="19" fill="#0f1a2e" stroke="#5d7aa8" stroke-width="1.5"/>
  <text x="580" y="644" text-anchor="middle" font-size="10" fill="#ddeeff">Rechercher / filtrer les OT</text>

  <ellipse cx="580" cy="680" rx="85"  ry="19" fill="#0f1a2e" stroke="#5d7aa8" stroke-width="1.5"/>
  <text x="580" y="684" text-anchor="middle" font-size="10" fill="#ddeeff">Consulter son profil</text>

  <ellipse cx="580" cy="722" rx="75"  ry="19" fill="#0f1a2e" stroke="#5d7aa8" stroke-width="1.5"/>
  <text x="580" y="726" text-anchor="middle" font-size="10" fill="#ddeeff">Se déconnecter</text>


  <!-- ══════════════════════════════════
       5. ADMIN  (cy=800)
  ══════════════════════════════════ -->
  <circle cx="65" cy="800" r="15" fill="none" stroke="#c0d0e8" stroke-width="1.8"/>
  <line x1="65" y1="815" x2="65" y2="858" stroke="#c0d0e8" stroke-width="1.8"/>
  <line x1="41" y1="836" x2="89" y2="836" stroke="#c0d0e8" stroke-width="1.8"/>
  <line x1="65" y1="858" x2="45" y2="858" stroke="#c0d0e8" stroke-width="0"/>
  <line x1="65" y1="858" x2="85" y2="858" stroke="#c0d0e8" stroke-width="0"/>
  <text x="65" y="868" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0d0e8">Admin</text>
  <text x="65" y="882" text-anchor="middle" font-size="10" fill="#8899bb" font-style="italic">«système»</text>

  <!-- Acteur → Hub -->
  <line x1="89" y1="836" x2="200" y2="836" stroke="#7a9abf" stroke-width="1.4" marker-end="url(#arr)"/>

  <ellipse cx="270" cy="836" rx="68" ry="21" fill="#1a2845" stroke="#8899cc" stroke-width="1.8"/>
  <text x="270" y="840" text-anchor="middle" font-size="11" font-weight="bold" fill="#ddeeff">Espace Admin</text>

  <!-- Hub(338,836) → UC -->
  <line x1="338" y1="836" x2="488" y2="836" stroke="#7a9abf" stroke-width="1.2" marker-end="url(#arr)"/>

  <ellipse cx="580" cy="836" rx="90" ry="19" fill="#0f1a2e" stroke="#5d7aa8" stroke-width="1.5"/>
  <text x="580" y="840" text-anchor="middle" font-size="10" fill="#ddeeff">Gérer les utilisateurs</text>

</svg>
</body>
</html>
